env:
  es2020: true
  browser: true
  commonjs: true

extends:
  - 'eslint:recommended'
  - 'plugin:react/recommended'
  - 'plugin:react/jsx-runtime'

parserOptions:
  ecmaFeatures:
    jsx: true
  ecmaVersion: 2020
  sourceType: module

plugins: ['react']

settings:
  react:
    version: 'detect'

rules:
  no-unused-vars: 'warn'
  no-undef: 'error'
